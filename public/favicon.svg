<svg width="800" height="800" viewBox="120 180 600 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"></stop>
      <stop offset="35%" stop-color="#d9d9d9"></stop>
      <stop offset="65%" stop-color="#f5f5f5"></stop>
      <stop offset="100%" stop-color="#bfbfbf"></stop>
    </linearGradient>
  </defs>

  <!-- Gráfico -->
  <g fill="url(#silver)">
    <rect x="290" y="450" width="50" height="80"></rect>
    <rect x="360" y="420" width="50" height="110"></rect>
    <rect x="430" y="390" width="50" height="140"></rect>
    <rect x="500" y="350" width="50" height="180"></rect>
  </g>

  <!-- Curva crescente -->
  <path d="M180 500 C320 500 450 450 620 330" fill="none" stroke="url(#silver)" stroke-width="18" stroke-linecap="round"></path>

  <polygon points="620,330 600,340 612,360 660,320" fill="url(#silver)"></polygon>

  <!-- SF -->
  <text x="180" y="430" font-family="Arial, Helvetica, sans-serif" font-size="260" font-weight="900" fill="url(#silver)">SF</text>

  <!-- Nome -->
  <text x="210" y="650" font-family="Arial, Helvetica, sans-serif" font-size="90" fill="url(#silver)">Sales Flow</text>
</svg>